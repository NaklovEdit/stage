<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoESIUM - Mobility Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="nav-placeholder"></header>

<main class="container">
    <section class="form-section">
        <h1>Postuler pour un programme de mobilité</h1>
        <p>Remplissez le formulaire ci-dessous pour soumettre votre candidature au programme CoESIUM[cite: 76].</p>
        
        <form id="applicationForm">
            <div class="form-group">
                <label for="lastName">Nom</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="firstName">Prénom</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="email">Email Universitaire</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="university">Université d'origine</label>
                <select id="university" name="university">
                    <option value="utp">UTP (Malaysia)</option>
                    <option value="ensam">Arts et Métiers (France)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="program">Programme choisi</label>
                <input type="text" id="program" name="program" placeholder="ex: Dual PhD, Semester Exchange" required>
            </div>
            <button type="submit" class="btn-submit">Envoyer ma candidature</button>
        </form>
        <div id="formFeedback"></div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
